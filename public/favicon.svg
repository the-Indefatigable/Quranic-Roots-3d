<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" fill="#1a2240"/>
  <!-- Open book -->
  <g transform="translate(32,30)" stroke="#d4af7a" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left page -->
    <path d="M-2,-10 C-2,-10 -14,-12 -16,-8 L-16,10 C-14,7 -2,8 -2,8Z" fill="#d4af7a" fill-opacity="0.15"/>
    <!-- Right page -->
    <path d="M2,-10 C2,-10 14,-12 16,-8 L16,10 C14,7 2,8 2,8Z" fill="#d4af7a" fill-opacity="0.15"/>
    <!-- Spine -->
    <line x1="0" y1="-10" x2="0" y2="8"/>
    <!-- Page lines left -->
    <line x1="-12" y1="-4" x2="-4" y2="-5" opacity="0.5"/>
    <line x1="-12" y1="0" x2="-4" y2="-1" opacity="0.5"/>
    <line x1="-12" y1="4" x2="-4" y2="3" opacity="0.5"/>
    <!-- Page lines right -->
    <line x1="4" y1="-5" x2="12" y2="-4" opacity="0.5"/>
    <line x1="4" y1="-1" x2="12" y2="0" opacity="0.5"/>
    <line x1="4" y1="3" x2="12" y2="4" opacity="0.5"/>
  </g>
  <!-- Small sparkle/star -->
  <circle cx="44" cy="16" r="2" fill="#d4af7a" opacity="0.7"/>
  <circle cx="48" cy="20" r="1" fill="#d4af7a" opacity="0.4"/>
</svg>
